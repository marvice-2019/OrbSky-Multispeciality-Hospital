# Host-level reverse proxy for OrbSky Hospital.
# Drop this into /etc/nginx/sites-available/orbskyhospital.com (or similar)
# then `sudo ln -s ... /etc/nginx/sites-enabled/` and `sudo nginx -t && sudo systemctl reload nginx`.
#
# SSL: easiest path is `sudo certbot --nginx -d orbskyhospital.com -d www.orbskyhospital.com`
# AFTER this file is in place — Certbot will edit it in-place to add the cert lines.

# ---- HTTP -> HTTPS redirect --------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name orbskyhospital.com www.orbskyhospital.com;

    # Let Certbot answer the ACME challenge on plain HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS site --------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name orbskyhospital.com www.orbskyhospital.com;

    # Certbot will inject these two lines:
    # ssl_certificate     /etc/letsencrypt/live/orbskyhospital.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/orbskyhospital.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    client_max_body_size 8M;   # allow doctor-photo uploads up to 5 MB + overhead

    # ---- /api/* -> FastAPI backend ------------------------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ---- Everything else -> React SPA (Nginx container) ---------------------
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
